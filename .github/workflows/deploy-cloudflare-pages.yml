name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build static artifact
        run: python3 scripts/build.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.112.0 pages deploy _site --project-name amesvt-website --branch main

      - name: Verify deployment
        run: |
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://amesvt.com/)" = "200"
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://www.amesvt.com/)" = "200"
